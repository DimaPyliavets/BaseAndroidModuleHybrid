<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Помилка завантаження</title>
  <style>
    /* ⚠️ ЗМІНИТИ: стилі відповідно до брендингу додатка */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      text-align: center;
      padding: 24px;
    }
    .icon  { font-size: 64px; margin-bottom: 16px; }
    h1     { font-size: 1.4rem; margin-bottom: 8px; }
    p      { font-size: 0.95rem; color: #666; max-width: 280px; }
    button {
      margin-top: 24px;
      padding: 12px 32px;
      border: none;
      border-radius: 8px;
      background: #6200ee;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- ⚠️ ЗМІНИТИ: текст та іконку відповідно до UX -->
  <div class="icon">📦</div>
  <h1>Вміст не завантажено</h1>
  <p>Веб-бандл ще не завантажений. Перевірте підключення до мережі та перезапустіть додаток.</p>
  <button onclick="retryLoad()">Спробувати знову</button>

  <script>
    function retryLoad() {
      // ⚠️ ЗМІНИТИ: можна передати сигнал у нативну частину через Bridge
      if (typeof window.Android !== "undefined") {
        // window.Android.requestUpdate(); // ⚠️ ДОДАТИ цей метод у NativeBridge якщо потрібно
      }
      window.location.reload();
    }
  </script>
</body>
</html>
