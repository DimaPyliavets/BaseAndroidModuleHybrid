<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Помилка завантаження</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-container { text-align: center; max-width: 400px; padding: 2rem; background: white; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="display-1 text-danger">⚠️</h1>
        <h2 class="fw-bold">Ой! Щось пішло не так</h2>
        <p class="text-muted mb-4">Ми не змогли завантажити контент. Будь ласка, перевірте з'єднання з інтернетом або спробуйте пізніше.</p>
        <button class="btn btn-primary w-100 py-2" onclick="location.reload()">🔄 Спробувати знову</button>
    </div>
</body>
</html>
