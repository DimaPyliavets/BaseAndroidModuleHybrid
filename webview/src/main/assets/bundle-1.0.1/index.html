<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sheet App</title>

<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root {
  --accent: #0078d4;
  --bg: #f3f3f3;
  --card: #ffffff;
  --text: #111;
}

body.dark {
  --bg: #1b1b1b;
  --card: #2a2a2a;
  --text: #fff;
}

body {
  margin:0;
  font-family: "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
.header {
  display:flex;
  gap:10px;
  padding:12px;
  background: var(--card);
  position: sticky;
  top:0;
  z-index:10;
}

.btn {
  border:none;
  padding:10px 14px;
  background: var(--accent);
  color:white;
  cursor:pointer;
  border-radius:4px;
}

.btn.secondary { background:#666; }
.btn.danger { background:#d83b01; }
.btn.light { background:#e1e1e1; color:#000; }

/* TABLE */
.container {
  padding:10px;
}

.table-wrap {
  overflow:auto;
  background:var(--card);
  border-radius:6px;
}

table {
  border-collapse: collapse;
  width:100%;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  min-width:120px;
}

td {
  background: var(--card);
}

td[contenteditable] {
  outline:none;
}

/* FILTERS */
.filters {
  display:flex;
  gap:6px;
  overflow:auto;
  padding:6px 0;
}

.filters input {
  padding:6px;
  border:1px solid #ccc;
  border-radius:4px;
}

/* MOBILE */
@media (max-width:600px) {
  .header {
    flex-wrap: wrap;
  }

  th, td {
    min-width:100px;
    font-size:14px;
  }
}
</style>
</head>

<body>

<div class="header">
<input type="file" id="fileInput">

<button class="btn" onclick="createSheet()">New</button>
<button class="btn" onclick="exportExcel()">Export</button>
<button class="btn secondary" onclick="printTable()">Print</button>
<button class="btn light" onclick="toggleDark()">Theme</button>
<button class="btn light" onclick="saveData()">Save</button>
</div>

<div class="container">

<div class="filters" id="filters"></div>

<div class="table-wrap">
<table id="sheet">
<thead><tr id="headerRow"></tr></thead>
<tbody id="body"></tbody>
</table>
</div>

<div style="margin-top:10px; display:flex; gap:10px;">
<button class="btn" onclick="addRow()">Add</button>
<button class="btn danger" onclick="deleteRow()">Delete</button>
</div>

</div>

<script>
let data = [];
let filteredData = [];
let headers = [];
let selectedRow = null;

/* INIT */
window.onload = () => {
  loadData();
  renderAll();
};

/* RENDER */
function renderAll(){
  renderFilters();
  applyFilters();
}

function renderTable(){
  const body = document.getElementById("body");
  const headerRow = document.getElementById("headerRow");

  headerRow.innerHTML = "";
  body.innerHTML = "";

  headers.forEach(h=>{
    let th=document.createElement("th");
    th.innerText=h;
    headerRow.appendChild(th);
  });

  filteredData.forEach((row,i)=>{
    let tr=document.createElement("tr");
    tr.onclick=()=>selectedRow=i;

    row.forEach((cell,j)=>{
      let td=document.createElement("td");
      td.contentEditable=true;
      td.innerText=cell;

      td.oninput=()=>{
        let realIndex=data.indexOf(row);
        data[realIndex][j]=td.innerText;
      };

      tr.appendChild(td);
    });

    body.appendChild(tr);
  });
}

/* FILTERS */
function renderFilters(){
  let container=document.getElementById("filters");
  container.innerHTML="";

  headers.forEach((h,i)=>{
    let input=document.createElement("input");
    input.placeholder="Filter "+h;
    input.dataset.index=i;
    input.oninput=applyFilters;
    container.appendChild(input);
  });
}

function applyFilters(){
  let inputs=document.querySelectorAll("#filters input");

  filteredData=data.filter(row=>{
    return [...inputs].every(inp=>{
      let val=inp.value.toLowerCase();
      if(!val) return true;
      return (row[inp.dataset.index]||"").toString().toLowerCase().includes(val);
    });
  });

  renderTable();
}

/* CRUD */
function addRow(){
  data.push(Array(headers.length).fill(""));
  renderAll();
}

function deleteRow(){
  if(selectedRow!=null){
    let row=filteredData[selectedRow];
    data.splice(data.indexOf(row),1);
    selectedRow=null;
    renderAll();
  }
}

function createSheet(){
  headers = ["Column 1","Column 2","Column 3"];
  data = [];
  renderAll();
}

/* SAVE LOCAL */
function saveData(){
  localStorage.setItem("sheet", JSON.stringify({headers,data}));
}

/* LOAD */
function loadData(){
  let saved = localStorage.getItem("sheet");
  if(saved){
    let parsed = JSON.parse(saved);
    headers = parsed.headers || [];
    data = parsed.data || [];
  }
  filteredData = data;
}

/* IMPORT FILE */
fileInput.onchange = e => {
  let reader = new FileReader();

  reader.onload = evt => {
    let wb = XLSX.read(evt.target.result, { type: "binary" });
    let sheet = wb.Sheets[wb.SheetNames[0]];
    let json = XLSX.utils.sheet_to_json(sheet, { header: 1 });

    if(json.length === 0) return;

    let firstRow = json[0];
    let isHeader = firstRow.some(cell => isNaN(cell));

    if(isHeader){
      headers = firstRow.map(h => h || "Column");
      data = json.slice(1);
    } else {
      headers = firstRow.map((_,i)=>"Column "+(i+1));
      data = json;
    }

    normalizeData();
    renderAll();
  };

  reader.readAsBinaryString(e.target.files[0]);
};

/* NORMALIZE */
function normalizeData(){
  const cols = headers.length;

  data = data.map(row=>{
    let r=[...row];
    while(r.length < cols) r.push("");
    return r.slice(0, cols);
  });
}

/* EXPORT FILE */
function exportExcel(){
  let ws = XLSX.utils.aoa_to_sheet([headers, ...data]);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Sheet");
  XLSX.writeFile(wb, "data.xlsx");
}

/* PRINT (mobile friendly) */
function printTable(){
  let html = "<table border='1'>";
  html += "<tr>"+headers.map(h=>"<th>"+h+"</th>").join("")+"</tr>";
  data.forEach(r=>{
    html += "<tr>"+r.map(c=>"<td>"+c+"</td>").join("")+"</tr>";
  });
  html += "</table>";

  let win = window.open("");
  win.document.write(html);
  win.print();
}

/* THEME */
function toggleDark(){
  document.body.classList.toggle("dark");
  localStorage.setItem("dark", document.body.classList.contains("dark"));
}

if(localStorage.getItem("dark")==="true"){
  document.body.classList.add("dark");
}

/* PWA */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
