<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Limit App</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app">
      <div id="screen-limit" class="screen active">
        <h1>Today</h1>

        <div class="progress-wrapper">
          <svg width="220" height="220">
            <circle cx="110" cy="110" r="90" class="bg" />
            <circle
              cx="110"
              cy="110"
              r="90"
              class="progress"
              id="progressCircle"
            />
          </svg>

          <div class="progress-text">
            <span id="value">0</span>
            <small id="limitText">of 20</small>
          </div>
        </div>

        <button class="btn primary" onclick="setLimit()">
          Set Daily Limit
        </button>
        <button class="btn secondary" onclick="useOne()">Use −1</button>
      </div>

      <div id="screen-history" class="screen">
        <h1>Activity</h1>

        <div id="history"></div>
      </div>

      <nav class="nav">
        <button onclick="switchTab('limit')" id="nav-limit">Limit</button>
        <button onclick="switchTab('history')" id="nav-history">History</button>
      </nav>
    </div>

    <script src="app.js"></script>
  </body>
</html>
