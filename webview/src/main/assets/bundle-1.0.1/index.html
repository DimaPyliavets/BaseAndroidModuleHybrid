<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Device Test Panel</title>

  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #e6e6e6;
      --accent: #4da3ff;
      --muted: #9aa4b2;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, Arial;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 16px;
      font-size: 18px;
      font-weight: 600;
      border-bottom: 1px solid #222;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 12px;
    }

    @media (min-width: 800px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .card {
      background: var(--card);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #222;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #000;
      font-weight: 600;
    }

    .value {
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
      word-break: break-word;
    }

    canvas {
      width: 100%;
      height: 80px;
      background: #0b0d10;
      border-radius: 8px;
      margin-top: 8px;
    }
  </style>
</head>

<body>

<header>
  Device Test Panel
</header>

<div class="grid">

  <div class="card">
    <h3>Device Info (Kotlin)</h3>
    <button onclick="loadDeviceInfo()">Get Device Info</button>
    <div id="deviceInfo" class="value">empty</div>
  </div>

  <div class="card">
    <h3>Vibration Test</h3>
    <button onclick="vibrate()">Vibrate 300ms</button>
  </div>

  <div class="card">
    <h3>Flashlight</h3>
    <button onclick="flash(true)">ON</button>
    <button onclick="flash(false)">OFF</button>
  </div>

  <div class="card">
    <h3>FPS Test</h3>
    <div id="fps" class="value">0 FPS</div>
    <canvas id="fpsCanvas"></canvas>
  </div>

  <div class="card">
    <h3>Sensor Data</h3>
    <div id="sensor" class="value">waiting...</div>
  </div>

  <div class="card">
    <h3>Network Speed Test</h3>
    <button onclick="speedTest()">Start test</button>
    <div id="speed" class="value"></div>
  </div>

</div>

<script>
/* -------------------------
   Kotlin Bridge helpers
--------------------------*/
function isAndroid() {
  return typeof window.Android !== "undefined";
}

function loadDeviceInfo() {
  if (!isAndroid()) return;

  const raw = window.Android.getDeviceInfo();
  document.getElementById("deviceInfo").innerText = raw;
}

function vibrate() {
  if (!isAndroid()) return;
  window.Android.vibrate(300);
}

function flash(state) {
  if (!isAndroid()) return;
  window.Android.setFlashlight(state);
}

/* -------------------------
   FPS meter
--------------------------*/
let last = performance.now();
let frames = 0;
let fpsOut = document.getElementById("fps");

function loop() {
  const now = performance.now();
  frames++;

  if (now - last >= 1000) {
    fpsOut.innerText = frames + " FPS";
    frames = 0;
    last = now;
  }

  requestAnimationFrame(loop);
}
loop();

/* -------------------------
   Sensor API
--------------------------*/
const sensorOut = document.getElementById("sensor");

window.addEventListener("deviceorientation", (e) => {
  sensorOut.innerText =
    "alpha: " + (e.alpha || 0).toFixed(2) + "\n" +
    "beta: " + (e.beta || 0).toFixed(2) + "\n" +
    "gamma: " + (e.gamma || 0).toFixed(2);
});

window.addEventListener("devicemotion", (e) => {
  const a = e.accelerationIncludingGravity;
  if (!a) return;

  sensorOut.innerText =
    "x: " + (a.x || 0).toFixed(2) + "\n" +
    "y: " + (a.y || 0).toFixed(2) + "\n" +
    "z: " + (a.z || 0).toFixed(2);
});

/* -------------------------
   Simple network test
--------------------------*/
async function speedTest() {
  const out = document.getElementById("speed");
  out.innerText = "running...";

  const url = "https://upload.wikimedia.org/wikipedia/commons/3/3f/Fronalpstock_big.jpg";

  const start = performance.now();
  try {
    const res = await fetch(url, { cache: "no-store" });
    const blob = await res.blob();
    const end = performance.now();

    const ms = (end - start).toFixed(0);
    const kb = (blob.size / 1024).toFixed(0);

    out.innerText = `Time: ${ms} ms\nSize: ${kb} KB`;
  } catch (e) {
    out.innerText = "error";
  }
}
</script>

</body>
</html>
