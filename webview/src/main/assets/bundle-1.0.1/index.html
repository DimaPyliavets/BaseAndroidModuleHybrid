<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hybrid Test Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root {
  --accent:#0078d4;
  --bg:#f2f2f2;
  --card:#fff;
  --text:#111;
}

body.dark {
  --bg:#1b1b1b;
  --card:#2a2a2a;
  --text:#fff;
}

body {
  margin:0;
  font-family:"Segoe UI", sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:10px;
  background:var(--card);
}

button {
  border:none;
  padding:10px;
  background:var(--accent);
  color:#fff;
  border-radius:4px;
  cursor:pointer;
}

button.secondary { background:#666; }
button.danger { background:#d83b01; }
button.light { background:#ddd; color:#000; }

/* GRID */
.grid {
  display:grid;
  grid-template-columns: 1fr 2fr;
  gap:10px;
  padding:10px;
}

@media(max-width:800px){
  .grid {
    grid-template-columns:1fr;
  }
}

/* CARDS */
.card {
  background:var(--card);
  padding:10px;
  border-radius:6px;
}

/* TABLE */
.table-wrap {
  overflow:auto;
  max-height:50vh;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:6px;
  min-width:100px;
}

td[contenteditable] {
  outline:none;
}

/* INPUTS */
input {
  width:100%;
  padding:6px;
  margin-bottom:5px;
}
</style>
</head>

<body>

<div class="header">
<input type="file" id="fileInput">

<button onclick="loadSample()">Load Sample</button>
<button onclick="exportExcel()">Export</button>
<button onclick="printTable()">Print</button>
<button class="light" onclick="toggleDark()">Theme</button>

<button class="secondary" onclick="notify()">Notify</button>
<button class="secondary" onclick="vibrate()">Vibrate</button>
<button class="secondary" onclick="deviceInfo()">Device</button>
<button class="secondary" onclick="sync()">Sync</button>
</div>

<div class="grid">

<!-- LEFT PANEL -->
<div class="card">
<h3>Actions</h3>

<button onclick="addRow()">Add Row</button>
<button class="danger" onclick="deleteRow()">Delete Row</button>

<hr>

<h3>Filters</h3>
<div id="filters"></div>

<hr>

<h3>Stats</h3>
<div id="stats"></div>
</div>

<!-- TABLE -->
<div class="card">
<div class="table-wrap">
<table>
<thead><tr id="headerRow"></tr></thead>
<tbody id="body"></tbody>
</table>
</div>
</div>

</div>

<script>
let data=[];
let headers=[];
let filteredData=[];
let selectedRow=null;

/* ANDROID */
function isAndroid(){
  return typeof window.Android!=="undefined";
}

/* NATIVE */
function notify(){
  isAndroid()
    ? window.Android.showNotification("Test","Working")
    : alert("Notification");
}

function vibrate(){
  isAndroid()
    ? window.Android.vibrate(200)
    : navigator.vibrate?.(200);
}

function deviceInfo(){
  if(isAndroid()){
    let info=JSON.parse(window.Android.getDeviceInfo());
    alert(info.model+" | Android "+info.androidVersion);
  } else alert("Browser mode");
}

function sync(){
  let payload={
    title:"Rows "+data.length,
    subtitle:"Time "+Date.now()
  };

  if(isAndroid()){
    window.Android.syncData(JSON.stringify(payload));
    notify();
  }
}

/* SAMPLE */
function loadSample(){
  headers=["Name","Age","Country"];
  data=[
    ["John",25,"USA"],
    ["Anna",30,"UK"],
    ["Max",22,"DE"]
  ];
  renderAll();
}

/* TABLE */
function renderAll(){
  renderFilters();
  applyFilters();
  updateStats();
}

function renderTable(){
  let body=document.getElementById("body");
  let headerRow=document.getElementById("headerRow");

  body.innerHTML="";
  headerRow.innerHTML="";

  headers.forEach(h=>{
    let th=document.createElement("th");
    th.innerText=h;
    headerRow.appendChild(th);
  });

  filteredData.forEach((row,i)=>{
    let tr=document.createElement("tr");
    tr.onclick=()=>selectedRow=i;

    row.forEach((cell,j)=>{
      let td=document.createElement("td");
      td.contentEditable=true;
      td.innerText=cell;

      td.oninput=()=>{
        let realIndex=data.indexOf(row);
        data[realIndex][j]=td.innerText;
      };

      tr.appendChild(td);
    });

    body.appendChild(tr);
  });
}

/* FILTER */
function renderFilters(){
  let c=document.getElementById("filters");
  c.innerHTML="";

  headers.forEach((h,i)=>{
    let inp=document.createElement("input");
    inp.placeholder="Filter "+h;
    inp.dataset.index=i;
    inp.oninput=applyFilters;
    c.appendChild(inp);
  });
}

function applyFilters(){
  let inputs=document.querySelectorAll("#filters input");

  filteredData=data.filter(r=>{
    return [...inputs].every(inp=>{
      let val=inp.value.toLowerCase();
      if(!val) return true;
      return (r[inp.dataset.index]||"").toLowerCase().includes(val);
    });
  });

  renderTable();
}

/* CRUD */
function addRow(){
  data.push(Array(headers.length).fill(""));
  renderAll();
}

function deleteRow(){
  if(selectedRow!=null){
    let r=filteredData[selectedRow];
    data.splice(data.indexOf(r),1);
    selectedRow=null;
    renderAll();
  }
}

/* STATS */
function updateStats(){
  document.getElementById("stats").innerHTML =
    "Rows: "+data.length+"<br>Columns: "+headers.length;
}

/* FILE */
fileInput.onchange=e=>{
  let reader=new FileReader();

  reader.onload=evt=>{
    let wb=XLSX.read(evt.target.result,{type:"binary"});
    let sheet=wb.Sheets[wb.SheetNames[0]];
    let json=XLSX.utils.sheet_to_json(sheet,{header:1});

    if(!json.length) return;

    headers=json[0];
    data=json.slice(1);
    renderAll();
  };

  reader.readAsBinaryString(e.target.files[0]);
};

/* EXPORT */
function exportExcel(){
  let ws=XLSX.utils.aoa_to_sheet([headers,...data]);
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Sheet");
  XLSX.writeFile(wb,"test.xlsx");
}

/* PRINT */
function printTable(){
  let html="<table border='1'>";
  html+="<tr>"+headers.map(h=>"<th>"+h+"</th>").join("")+"</tr>";
  data.forEach(r=>{
    html+="<tr>"+r.map(c=>"<td>"+c+"</td>").join("")+"</tr>";
  });
  html+="</table>";

  let w=window.open("");
  w.document.write(html);
  w.print();
}

/* THEME */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* INIT */
window.onload=loadSample;
</script>

</body>
</html>
