<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spreadsheet PWA</title>

<link rel="manifest" href="manifest.json">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { background:#f5f6f8; }
body.dark { background:#121212; color:#fff; }

.dark .table { color:#fff; }
.dark td { background:#1e1e1e; }

.table-container { max-height:60vh; overflow:auto; }
td { min-width:120px; }
td[contenteditable="true"] { background:#fff; }
.dark td[contenteditable="true"] { background:#2a2a2a; }
</style>
</head>

<body>

<div class="container-fluid p-3">

<!-- TOP BAR -->
<div class="d-flex flex-wrap gap-2 mb-2">
<input type="file" id="fileInput" class="form-control w-auto">

<button class="btn btn-primary" onclick="createSheet()">New</button>
<button class="btn btn-success" onclick="exportExcel()">Export</button>
<button class="btn btn-secondary" onclick="window.print()">Print</button>
<button class="btn btn-dark" onclick="toggleDark()">🌙</button>
<button class="btn btn-outline-dark" onclick="saveData()">Save</button>
</div>

<!-- FILTERS -->
<div class="row mb-2" id="filters"></div>

<!-- TABLE -->
<div class="table-container bg-white p-2 rounded shadow-sm">
<table class="table table-bordered text-center" id="sheet">
<thead><tr id="headerRow"></tr></thead>
<tbody id="body"></tbody>
</table>
</div>

<!-- ACTIONS -->
<div class="mt-2 d-flex gap-2">
<button class="btn btn-success" onclick="addRow()">Add Row</button>
<button class="btn btn-danger" onclick="deleteRow()">Delete Row</button>
</div>

</div>

<script>
let data = [];
let filteredData = [];
let headers = [];
let selectedRow = null;

/* INIT */
window.onload = () => {
  loadData();
  renderAll();
};

/* RENDER */
function renderAll(){
  renderFilters();
  applyFilters();
}

function renderTable(){
  const body = document.getElementById("body");
  const headerRow = document.getElementById("headerRow");

  headerRow.innerHTML = "";
  body.innerHTML = "";

  headers.forEach(h=>{
    let th=document.createElement("th");
    th.innerText=h;
    headerRow.appendChild(th);
  });

  filteredData.forEach((row,i)=>{
    let tr=document.createElement("tr");
    tr.onclick=()=>selectedRow=i;

    row.forEach((cell,j)=>{
      let td=document.createElement("td");
      td.contentEditable=true;
      td.innerText=cell;

      td.oninput=()=>{
        let realIndex=data.indexOf(row);
        data[realIndex][j]=td.innerText;
      };

      tr.appendChild(td);
    });

    body.appendChild(tr);
  });
}

/* FILTERS */
function renderFilters(){
  let container=document.getElementById("filters");
  container.innerHTML="";

  headers.forEach((h,i)=>{
    let input=document.createElement("input");
    input.className="form-control col";
    input.placeholder="Filter "+h;
    input.dataset.index=i;
    input.oninput=applyFilters;
    container.appendChild(input);
  });
}

function applyFilters(){
  let inputs=document.querySelectorAll("#filters input");

  filteredData=data.filter(row=>{
    return [...inputs].every(inp=>{
      let val=inp.value.toLowerCase();
      if(!val) return true;
      return (row[inp.dataset.index]||"").toString().toLowerCase().includes(val);
    });
  });

  renderTable();
}

/* CRUD */
function addRow(){
  data.push(Array(headers.length).fill(""));
  renderAll();
}

function deleteRow(){
  if(selectedRow!=null){
    let row=filteredData[selectedRow];
    data.splice(data.indexOf(row),1);
    selectedRow=null;
    renderAll();
  }
}

function createSheet(){
  headers = ["Column 1","Column 2","Column 3"];
  data = [];
  renderAll();
}

/* SAVE */
function saveData(){
  localStorage.setItem("sheet", JSON.stringify({headers,data}));
}

function loadData(){
  let saved = localStorage.getItem("sheet");
  if(saved){
    let parsed = JSON.parse(saved);
    headers = parsed.headers || [];
    data = parsed.data || [];
  }
  filteredData = data;
}

/* IMPORT */
fileInput.onchange = e => {
  let reader = new FileReader();

  reader.onload = evt => {
    let wb = XLSX.read(evt.target.result, { type: "binary" });
    let sheet = wb.Sheets[wb.SheetNames[0]];
    let json = XLSX.utils.sheet_to_json(sheet, { header: 1 });

    if(json.length === 0) return;

    let firstRow = json[0];

    // визначаємо чи це headers
    let isHeader = firstRow.some(cell => isNaN(cell));

    if(isHeader){
      headers = firstRow.map(h => h || "Column");
      data = json.slice(1);
    } else {
      headers = firstRow.map((_,i)=>"Column "+(i+1));
      data = json;
    }

    normalizeData();
    renderAll();
  };

  reader.readAsBinaryString(e.target.files[0]);
};

/* NORMALIZE */
function normalizeData(){
  const cols = headers.length;

  data = data.map(row=>{
    let r=[...row];
    while(r.length < cols) r.push("");
    return r.slice(0, cols);
  });
}

/* EXPORT */
function exportExcel(){
  let ws = XLSX.utils.aoa_to_sheet([headers, ...data]);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Sheet");
  XLSX.writeFile(wb, "data.xlsx");
}

/* DARK MODE */
function toggleDark(){
  document.body.classList.toggle("dark");
  localStorage.setItem("dark", document.body.classList.contains("dark"));
}

if(localStorage.getItem("dark")==="true"){
  document.body.classList.add("dark");
}

/* PWA */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
