<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hybrid Sheet App</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root {
  --accent:#0078d4;
  --bg:#f3f3f3;
  --card:#fff;
  --text:#111;
}

body.dark {
  --bg:#1b1b1b;
  --card:#2a2a2a;
  --text:#fff;
}

body {
  margin:0;
  font-family:"Segoe UI", sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* UI */
.header {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:10px;
  background:var(--card);
}

button {
  padding:10px;
  border:none;
  background:var(--accent);
  color:#fff;
  border-radius:4px;
}

button.secondary { background:#666; }
button.light { background:#ddd; color:#000; }
button.danger { background:#d83b01; }

.container { padding:10px; }

.table-wrap {
  overflow:auto;
  background:var(--card);
}

table { border-collapse:collapse; width:100%; }
td, th {
  border:1px solid #ccc;
  padding:8px;
  min-width:100px;
}

.filters {
  display:flex;
  gap:6px;
  overflow:auto;
  margin-bottom:6px;
}

.filters input {
  padding:6px;
}
</style>
</head>

<body>

<div class="header">
<input type="file" id="fileInput">

<button onclick="createSheet()">New</button>
<button onclick="exportExcel()">Export</button>
<button onclick="printTable()">Print</button>
<button class="light" onclick="toggleDark()">Theme</button>
<button class="light" onclick="saveData()">Save</button>

<button class="secondary" onclick="notify()">Notify</button>
<button class="secondary" onclick="vibrate()">Vibrate</button>
<button class="secondary" onclick="getDevice()">Device</button>
<button class="secondary" onclick="syncToNative()">Sync</button>
</div>

<div class="container">

<div class="filters" id="filters"></div>

<div class="table-wrap">
<table>
<thead><tr id="headerRow"></tr></thead>
<tbody id="body"></tbody>
</table>
</div>

<div style="margin-top:10px; display:flex; gap:10px;">
<button onclick="addRow()">Add</button>
<button class="danger" onclick="deleteRow()">Delete</button>
</div>

</div>

<script>
let data=[];
let filteredData=[];
let headers=[];
let selectedRow=null;

/* ---------- ANDROID BRIDGE SAFE ---------- */
function isAndroid(){
  return typeof window.Android !== "undefined";
}

/* ---------- NATIVE CALLS ---------- */
function notify(){
  if(isAndroid()){
    window.Android.showNotification("Sheet App","Action executed");
  } else {
    alert("Notification test");
  }
}

function vibrate(){
  if(isAndroid()){
    window.Android.vibrate(200);
  } else {
    navigator.vibrate?.(200);
  }
}

function getDevice(){
  if(isAndroid()){
    let info=JSON.parse(window.Android.getDeviceInfo());
    alert("Model: "+info.model+"\nAndroid: "+info.androidVersion);
  } else {
    alert("Browser mode");
  }
}

function syncToNative(){
  const payload={
    title:"Rows: "+data.length,
    subtitle:"Last sync "+Date.now()
  };

  if(isAndroid()){
    window.Android.syncData(JSON.stringify(payload));
    notify();
  }
}

/* ---------- TABLE ---------- */
function renderAll(){
  renderFilters();
  applyFilters();
}

function renderTable(){
  const body=document.getElementById("body");
  const headerRow=document.getElementById("headerRow");

  body.innerHTML="";
  headerRow.innerHTML="";

  headers.forEach(h=>{
    let th=document.createElement("th");
    th.innerText=h;
    headerRow.appendChild(th);
  });

  filteredData.forEach((row,i)=>{
    let tr=document.createElement("tr");
    tr.onclick=()=>selectedRow=i;

    row.forEach((cell,j)=>{
      let td=document.createElement("td");
      td.contentEditable=true;
      td.innerText=cell;

      td.oninput=()=>{
        let realIndex=data.indexOf(row);
        data[realIndex][j]=td.innerText;
      };

      tr.appendChild(td);
    });

    body.appendChild(tr);
  });
}

/* ---------- FILTER ---------- */
function renderFilters(){
  let container=document.getElementById("filters");
  container.innerHTML="";

  headers.forEach((h,i)=>{
    let input=document.createElement("input");
    input.placeholder="Filter "+h;
    input.dataset.index=i;
    input.oninput=applyFilters;
    container.appendChild(input);
  });
}

function applyFilters(){
  let inputs=document.querySelectorAll("#filters input");

  filteredData=data.filter(row=>{
    return [...inputs].every(inp=>{
      let val=inp.value.toLowerCase();
      if(!val) return true;
      return (row[inp.dataset.index]||"").toLowerCase().includes(val);
    });
  });

  renderTable();
}

/* ---------- CRUD ---------- */
function addRow(){
  data.push(Array(headers.length).fill(""));
  renderAll();
}

function deleteRow(){
  if(selectedRow!=null){
    let row=filteredData[selectedRow];
    data.splice(data.indexOf(row),1);
    selectedRow=null;
    renderAll();
  }
}

function createSheet(){
  headers=["Column 1","Column 2"];
  data=[];
  renderAll();
}

/* ---------- FILE ---------- */
fileInput.onchange=e=>{
  let reader=new FileReader();

  reader.onload=evt=>{
    let wb=XLSX.read(evt.target.result,{type:"binary"});
    let sheet=wb.Sheets[wb.SheetNames[0]];
    let json=XLSX.utils.sheet_to_json(sheet,{header:1});

    if(!json.length) return;

    let first=json[0];
    let isHeader=first.some(x=>isNaN(x));

    if(isHeader){
      headers=first;
      data=json.slice(1);
    } else {
      headers=first.map((_,i)=>"Column "+(i+1));
      data=json;
    }

    normalize();
    renderAll();
  };

  reader.readAsBinaryString(e.target.files[0]);
};

function normalize(){
  let cols=headers.length;

  data=data.map(r=>{
    let row=[...r];
    while(row.length<cols) row.push("");
    return row.slice(0,cols);
  });
}

/* ---------- EXPORT ---------- */
function exportExcel(){
  let ws=XLSX.utils.aoa_to_sheet([headers,...data]);
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Sheet");
  XLSX.writeFile(wb,"data.xlsx");
}

/* ---------- PRINT ---------- */
function printTable(){
  let html="<table border='1'>";
  html+="<tr>"+headers.map(h=>"<th>"+h+"</th>").join("")+"</tr>";

  data.forEach(r=>{
    html+="<tr>"+r.map(c=>"<td>"+c+"</td>").join("")+"</tr>";
  });

  html+="</table>";

  let w=window.open("");
  w.document.write(html);
  w.print();
}

/* ---------- STORAGE ---------- */
function saveData(){
  localStorage.setItem("sheet",JSON.stringify({headers,data}));

  if(isAndroid()){
    notify();
  }
}

function loadData(){
  let s=localStorage.getItem("sheet");
  if(s){
    let p=JSON.parse(s);
    headers=p.headers||[];
    data=p.data||[];
  }
  filteredData=data;
}

/* ---------- THEME ---------- */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* INIT */
window.onload=()=>{
  loadData();
  renderAll();
};
</script>

</body>
</html>
