<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Device Sensor Tester</title>

    <!-- Ionic Framework (MD Mode) -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6750A4">

    <style>
        :root {
            /* Material Design 3 (Material You) Variables */
            --ion-font-family: system-ui, -apple-system, Roboto, 'Helvetica Neue', sans-serif;
            --android-easing: cubic-bezier(0.2, 0, 0, 1);
            --ion-border-radius: 28px;
        }

        /* MD3 Card Style */
        ion-card {
            border-radius: var(--ion-border-radius);
            box-shadow: none;
            border: 1px solid rgba(0,0,0,0.08);
            margin: 16px;
            background: #fdfbff; /* Surface container low */
            transition: transform 0.2s var(--android-easing);
        }

        ion-card:active {
            transform: scale(0.98);
        }

        .sensor-data {
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            color: var(--ion-color-primary);
            font-size: 1.1rem;
        }

        #camera-preview {
            width: 100%;
            height: 240px;
            background: #1c1b1f;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 12px;
            display: none;
        }

        /* Safe Areas */
        ion-content {
            --padding-top: env(safe-area-inset-top);
            --padding-bottom: env(safe-area-inset-bottom);
        }

        /* Skeleton Screen */
        .skeleton-card {
            padding: 16px;
        }

        /* GPU Accelerated Transitions */
        .fade-in {
            animation: fadeIn 0.4s var(--android-easing) forwards;
            opacity: 0;
            will-change: opacity, transform;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="md">
    <ion-app>
        <!-- Skeleton Loading State -->
        <div id="skeleton-state" class="ion-page">
            <ion-header class="ion-no-border">
                <ion-toolbar>
                    <ion-title><ion-skeleton-text animated style="width: 60%"></ion-skeleton-text></ion-title>
                </ion-toolbar>
            </ion-header>
            <ion-content class="ion-padding">
                <ion-card class="skeleton-card">
                    <ion-skeleton-text animated style="width: 80%; height: 24px;"></ion-skeleton-text>
                    <ion-skeleton-text animated style="width: 100%; height: 150px; margin-top: 12px;"></ion-skeleton-text>
                </ion-card>
                <ion-card class="skeleton-card">
                    <ion-skeleton-text animated style="width: 50%; height: 24px;"></ion-skeleton-text>
                    <ion-skeleton-text animated style="width: 100%; height: 100px; margin-top: 12px;"></ion-skeleton-text>
                </ion-card>
            </ion-content>
        </div>

        <!-- Main App State -->
        <div id="app-state" class="ion-page" style="display: none;">
            <ion-header class="ion-no-border">
                <ion-toolbar color="surface">
                    <ion-title style="font-weight: 700;">Sensor Tester</ion-title>
                </ion-toolbar>
            </ion-header>

            <ion-content color="light" class="fade-in">
                <!-- Camera Test -->
                <ion-card>
                    <ion-card-header>
                        <ion-card-subtitle>Hardware</ion-card-subtitle>
                        <ion-card-title>📷 Camera Module</ion-card-title>
                    </ion-card-header>
                    <ion-card-content>
                        <video id="camera-preview" autoplay playsinline></video>
                        <ion-button expand="block" mode="md" class="ion-activatable ripple-parent" onclick="toggleCamera()">
                            Start Camera Test
                            <ion-ripple-effect></ion-ripple-effect>
                        </ion-button>
                    </ion-card-content>
                </ion-card>

                <!-- Accelerometer Test -->
                <ion-card>
                    <ion-card-header>
                        <ion-card-subtitle>Motion</ion-card-subtitle>
                        <ion-card-title>⚖️ Accelerometer</ion-card-title>
                    </ion-card-header>
                    <ion-card-content>
                        <ion-grid>
                            <ion-row>
                                <ion-col>
                                    <div class="ion-text-center">
                                        <div class="sensor-label">X-Axis</div>
                                        <div id="accel-x" class="sensor-data">0.00</div>
                                    </div>
                                </ion-col>
                                <ion-col>
                                    <div class="ion-text-center">
                                        <div class="sensor-label">Y-Axis</div>
                                        <div id="accel-y" class="sensor-data">0.00</div>
                                    </div>
                                </ion-col>
                                <ion-col>
                                    <div class="ion-text-center">
                                        <div class="sensor-label">Z-Axis</div>
                                        <div id="accel-z" class="sensor-data">0.00</div>
                                    </div>
                                </ion-col>
                            </ion-row>
                        </ion-grid>
                    </ion-card-content>
                </ion-card>

                <!-- Audio Test -->
                <ion-card>
                    <ion-card-header>
                        <ion-card-subtitle>Sound</ion-card-subtitle>
                        <ion-card-title>🔊 Stereo Speakers</ion-card-title>
                    </ion-card-header>
                    <ion-card-content>
                        <p class="ion-margin-bottom">Generate a high-frequency sine wave to test audio quality.</p>
                        <ion-button expand="block" fill="outline" mode="md" onclick="playTestTone()">
                            Play 440Hz Tone
                        </ion-button>
                    </ion-card-content>
                </ion-card>

                <!-- Notification Test -->
                <ion-card>
                    <ion-card-header>
                        <ion-card-subtitle>Native Bridge</ion-card-subtitle>
                        <ion-card-title>🔔 Notification Test</ion-card-title>
                    </ion-card-header>
                    <ion-card-content>
                        <ion-button expand="block" color="secondary" mode="md" onclick="sendNativeNotification()">
                            Trigger Alert
                        </ion-button>
                    </ion-card-content>
                </ion-card>

                <!-- Footer Spacer for Bottom Nav -->
                <div style="height: 80px;"></div>
            </ion-content>

            <!-- Bottom Navigation Bar -->
            <ion-footer class="ion-no-border">
                <ion-tab-bar slot="bottom">
                    <ion-tab-button tab="sensors" selected>
                        <ion-icon name="speedometer"></ion-icon>
                        <ion-label>Sensors</ion-label>
                    </ion-tab-button>
                    <ion-tab-button tab="info" onclick="openAbout()">
                        <ion-icon name="information-circle"></ion-icon>
                        <ion-label>Info</ion-label>
                    </ion-tab-button>
                </ion-tab-bar>
            </ion-footer>
        </div>
    </ion-app>

    <script>
        const BRIDGE_NAME = "Android";

        // --- Loading Simulation ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('skeleton-state').style.display = 'none';
                document.getElementById('app-state').style.display = 'block';
            }, 1200);
        });

        // --- 1. Camera Logic ---
        let stream = null;
        async function toggleCamera() {
            const video = document.getElementById('camera-preview');
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
                video.style.display = 'none';
            } else {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    video.srcObject = stream;
                    video.style.display = 'block';
                } catch (e) {
                    console.error(e);
                }
            }
        }

        // --- 2. Audio Logic ---
        function playTestTone() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }

        // --- 3. Accelerometer Logic ---
        if (window.DeviceMotionEvent) {
            window.addEventListener('devicemotion', (event) => {
                const acc = event.accelerationIncludingGravity;
                if (acc) {
                    document.getElementById('accel-x').innerText = acc.x.toFixed(2);
                    document.getElementById('accel-y').innerText = acc.y.toFixed(2);
                    document.getElementById('accel-z').innerText = acc.z.toFixed(2);
                }
            }, true);
        }

        // --- 4. Native Bridge Logic ---
        function sendNativeNotification() {
            if (window[BRIDGE_NAME]) {
                window[BRIDGE_NAME].showNotification(
                    "Sensor Tester",
                    "Device hardware test completed successfully! ✅"
                );
            } else {
                alert("Native Bridge not active.");
            }
        }

        function openAbout() {
            if (window[BRIDGE_NAME]) {
                window[BRIDGE_NAME].showNotification("About App", "PWA Device Tester v1.0.0 Built with Ionic & MD3");
            }
        }

        // --- Service Worker ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('SW Registered');
                }).catch(err => console.log('SW Registration Failed', err));
            });
        }
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</body>
</html>
